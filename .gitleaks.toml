title = "fitcall-be gitleaks config"

# Inherit the full default ruleset (AWS keys, GitHub tokens, Stripe keys,
# generic-api-key, etc.). This file only adds an allowlist on top.
[extend]
useDefault = true

# api.yaml contains OpenAPI `example:` blocks with JWT-shaped placeholder
# tokens like "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9..." — fake values used to
# illustrate response shapes for clients. They start with the standard
# base64-encoded JWT header and literally end in "..." (an ellipsis), so they
# can't be valid tokens. Trip the generic-api-key entropy heuristic anyway.
#
# Allowlist by path: api.yaml is API spec documentation and isn't a place
# where real secrets ever belong. If a developer ever pastes a live token
# in here, code review catches it; the same secret would still trip
# gitleaks if it appeared in any actual source file.
[allowlist]
description = "OpenAPI example tokens in api.yaml are documentation, not real secrets"
paths = [
    '''(^|[/\\])api\.yaml$''',
]
