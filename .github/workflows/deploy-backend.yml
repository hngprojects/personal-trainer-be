name: Deploy Backend

on:
  push:
    branches:
      - staging
      - main

concurrency:
  group: backend-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy-staging:
    if: github.ref == 'refs/heads/staging'
    name: Deploy Backend Staging
    runs-on: ubuntu-latest
    environment: staging

    steps:
      - name: Checkout backend repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build backend binary
        run: |
          mkdir -p deploy
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o deploy/personal-trainer-api ./cmd/server
          echo "${{ secrets.BACKEND_ENV_FILE }}" > deploy/.env

      - name: Upload backend staging
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT }}
          SOURCE: deploy/
          TARGET: /var/www/personal-trainer/backend/staging/
          ARGS: -rlgoDzvc --delete

      - name: Migrate and restart staging
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          request_pty: false
          script: |
            set -e

            cd /var/www/personal-trainer/backend/staging

            chmod +x personal-trainer-api
            chmod 600 .env

            ./personal-trainer-api migrate

            sudo -n /usr/bin/systemctl restart personal-trainer-backend-staging

            sleep 5

            sudo -n /usr/bin/systemctl status personal-trainer-backend-staging

            curl -f https://api-staging.yourdomain.com/health

  deploy-production:
    if: github.ref == 'refs/heads/main'
    name: Deploy Backend Production
    runs-on: ubuntu-latest
    environment: production

    steps:
      - name: Checkout backend repo
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Run tests
        run: go test ./...

      - name: Build backend binary
        run: |
          mkdir -p deploy
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -o deploy/personal-trainer-api ./cmd/server
          echo "${{ secrets.BACKEND_ENV_FILE }}" > deploy/.env

      - name: Backup production database
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          request_pty: false
          script: |
            set -e

            mkdir -p /var/backups/personal-trainer/postgres

            pg_dump \
              "${{ secrets.PRODUCTION_DATABASE_URL }}" \
              > /var/backups/personal-trainer/postgres/prod-$(date +%F-%H%M%S).sql

      - name: Upload backend production
        uses: easingthemes/ssh-deploy@main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
          REMOTE_HOST: ${{ secrets.SERVER_HOST }}
          REMOTE_USER: ${{ secrets.SERVER_USER }}
          REMOTE_PORT: ${{ secrets.SERVER_PORT }}
          SOURCE: deploy/
          TARGET: /var/www/personal-trainer/backend/production/
          ARGS: -rlgoDzvc --delete

      - name: Migrate and restart production
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          port: ${{ secrets.SERVER_PORT }}
          request_pty: false
          script: |
            set -e

            cd /var/www/personal-trainer/backend/production

            chmod +x personal-trainer-api
            chmod 600 .env

            ./personal-trainer-api migrate

            sudo -n /usr/bin/systemctl restart personal-trainer-backend-production

            sleep 5

            sudo -n /usr/bin/systemctl status personal-trainer-backend-production

            curl -f https://api.yourdomain.com/health