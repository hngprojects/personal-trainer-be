name: CI

on:
  pull_request:
    branches: [dev, staging, main]
  # Push runs only on dev — for staging/main, CI is invoked from the deploy
  # workflow as a reusable workflow (see workflow_call below) so that deploy
  # is gated by the same checks without running them twice.
  push:
    branches: [dev]
  # Allow other workflows (deploy-backend.yml) to call this one as a job
  # dependency. This is what implements "deploy depends on CI passing".
  workflow_call:

# Cancel previous runs of the same workflow on the same ref when a new one starts.
# Saves Actions minutes when devs push rapidly to a PR.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions:
  contents: read

env:
  GO_VERSION: "1.25.3"

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # `make lint` runs `go vet`; we also run golangci-lint per CONTRIBUTING.md.
      - name: go vet
        run: go vet ./...

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Integration tests in internal/routes/trainers_integration_test.go are
      # opt-in via RUN_INTEGRATION_TESTS=1 (they TRUNCATE tables). They are
      # intentionally NOT enabled here — bring up a Postgres service container
      # and set the env var when we want them.
      - name: Run tests
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out
          if-no-files-found: ignore
          retention-days: 7

  security:
    name: Trivy security scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write   # required to upload SARIF to GitHub Security tab
    steps:
      - uses: actions/checkout@v4

      # Filesystem scan covers:
      #   - Go module vulnerabilities (go.mod / go.sum)
      #   - Dockerfile / docker-compose misconfigurations
      #   - Hardcoded secrets
      - name: Trivy filesystem scan (SARIF for Security tab)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: sarif
          output: trivy-results.sarif
          ignore-unfixed: true
          severity: CRITICAL,HIGH,MEDIUM
          # SARIF upload below handles surfacing — don't fail the upload step.
          exit-code: "0"

      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif
          category: trivy-fs

      # Fail the job (and therefore the PR check) on HIGH/CRITICAL only.
      # MEDIUM findings still appear in the Security tab via the SARIF upload
      # above so we can triage them without blocking merges.
      - name: Trivy filesystem scan (fail on HIGH/CRITICAL)
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          format: table
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          exit-code: "1"

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Scan full git history, not just the working tree, so secrets that
          # were committed and later removed still get flagged. Trivy's fs scan
          # only looks at current files; this is the dedicated complementary
          # scan for the historical record.
          fetch-depth: 0

      - name: Install gitleaks
        env:
          GITLEAKS_VERSION: "8.30.1"
        run: |
          curl -fsSL "https://github.com/gitleaks/gitleaks/releases/download/v${GITLEAKS_VERSION}/gitleaks_${GITLEAKS_VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
          gitleaks version

      # `detect` walks every commit in the repo's history. To suppress a known
      # false positive (or an already-rotated secret), add its fingerprint to a
      # `.gitleaksignore` file at the repo root, or define an allowlist rule in
      # `.gitleaks.toml`. Real fix for any unexpected finding is to ROTATE the
      # secret, then ignore — the leak is in git history forever otherwise.
      - name: Scan repo and history for secrets
        run: gitleaks detect --source . --redact --no-banner --verbose

  # Aggregator status check — the branch-protection rule on `dev`/`main` requires
  # a status check named exactly "ci". This job exists solely so that one shows
  # up. It only goes green when every dependency above also went green.
  ci:
    name: ci
    runs-on: ubuntu-latest
    needs: [lint, test, security, secrets]
    if: always()
    steps:
      - name: Aggregate job results
        run: |
          echo "lint:     ${{ needs.lint.result }}"
          echo "test:     ${{ needs.test.result }}"
          echo "security: ${{ needs.security.result }}"
          echo "secrets:  ${{ needs.secrets.result }}"
          if [[ "${{ needs.lint.result }}" != "success" \
             || "${{ needs.test.result }}" != "success" \
             || "${{ needs.security.result }}" != "success" \
             || "${{ needs.secrets.result }}" != "success" ]]; then
            echo "::error::One or more required CI jobs failed"
            exit 1
          fi
          echo "All required CI jobs passed."
