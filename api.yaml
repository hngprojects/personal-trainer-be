  /media:
    get:
      security: []
      operationId: ListOrganisationMedia
      tags: [Media]
      summary: List organisation-level media (public, paginated)
      description: |
        Public read of the org-level media library. Optional filters:
        type=image|video, category=<freetext>, status=ready|processing|failed
        (defaults to ready so callers never see half-uploaded rows;
        pass status= explicitly to see everything).
      parameters:
        - name: type
          in: query
          required: false
          schema: { type: string, enum: [image, video] }
        - name: category
          in: query
          required: false
          schema: { type: string }
        - name: status
          in: query
          required: false
          schema: { type: string, enum: [ready, processing, failed] }
        - name: page
          in: query
          required: false
          schema: { type: integer, minimum: 1, default: 1 }
        - name: limit
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 100, default: 10 }
      responses:
        "200":
          description: Media list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: "#/components/schemas/OrganisationMedia"
        "400":
          description: Invalid query parameter
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "500":
          description: Internal server error
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }

  /media/images:
    post:
      operationId: UploadOrganisationImage
      tags: [Media]
      summary: Upload an organisation-level image (admin only)
      description: |
        Multipart upload. Returns 202 immediately with the row in
        status=processing; the worker uploads to MinIO and flips
        status to ready or failed shortly after.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, file]
              properties:
                title: { type: string, maxLength: 200 }
                description: { type: string, maxLength: 2000 }
                category: { type: string, maxLength: 64 }
                file: { type: string, format: binary, description: "JPEG / PNG / WebP / HEIC, max 5 MiB" }
      responses:
        "202":
          description: Image accepted; upload in progress
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/OrganisationMedia" }
        "400":
          description: Validation failure
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "401":
          description: Unauthorized
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "403":
          description: Caller is not admin or super_admin
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "413":
          description: File exceeds 5 MiB cap
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "503":
          description: Storage / uploader not configured or busy
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }

  /media/videos:
    post:
      operationId: UploadOrganisationVideo
      tags: [Media]
      summary: Upload an organisation-level video (admin only)
      description: |
        Multipart upload. Same async semantics as POST /media/images.
        Worker transcodes to MP4 (H.264, faststart) and uploads to
        MinIO. Max 500 MiB pre-transcode, max 10 minutes duration.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [title, file]
              properties:
                title: { type: string, maxLength: 200 }
                description: { type: string, maxLength: 2000 }
                category: { type: string, maxLength: 64 }
                file: { type: string, format: binary, description: "MP4 / MOV / WebM / etc, max 500 MiB, max 10 min" }
      responses:
        "202":
          description: Video accepted; transcode + upload in progress
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/OrganisationMedia" }
        "400":
          description: Validation failure
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "401":
          description: Unauthorized
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "403":
          description: Caller is not admin or super_admin
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "413":
          description: File exceeds upload cap
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "503":
          description: Storage / transcoder / uploader not configured or busy
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }

  /media/{id}:
    get:
      security: []
      operationId: GetOrganisationMediaByID
      tags: [Media]
      summary: Get one organisation-media record (public)
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "200":
          description: Media record
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data: { $ref: "#/components/schemas/OrganisationMedia" }
        "404":
          description: Not found
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "500":
          description: Internal server error
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }

    delete:
      operationId: DeleteOrganisationMedia
      tags: [Media]
      summary: Delete an organisation-media record (admin only)
      description: |
        Removes the DB row AND the underlying MinIO object so storage
        does not drift. 409 if the row is still processing - admin
        should wait for status to flip then retry.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema: { type: string, format: uuid }
      responses:
        "204":
          description: Deleted
        "401":
          description: Unauthorized
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "403":
          description: Caller is not admin or super_admin
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "404":
          description: Not found
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "409":
          description: Media is still processing
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
        "500":
          description: Internal server error
          content: { application/json: { schema: { $ref: "#/components/schemas/ErrorResponse" } } }
