  /bookings/{id}/reschedule:
    put:
      operationId: RescheduleDiscoveryCall
      tags:
        - Booking
      summary: Reschedule an existing discovery call booking
      description: |
        Allows a client to reschedule their discovery call to a new date and time.
        Blocked within 12 hours of the original call time.
        For Zoom bookings, the old meeting is deleted and a new one is created.
        For phone callbacks, only the time and phone number are updated.
        Maximum 3 reschedules per booking.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RescheduleBookingRequest"
      responses:
        "200":
          description: Discovery call rescheduled successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        $ref: "#/components/schemas/DiscoveryBookingResponse"
        "400":
          description: Invalid input or new time outside open hours / in the past
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Booking locked (within 12-hour window), cancelled, or completed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: New time slot already taken
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Maximum reschedule limit (3) reached
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /bookings/{id}/cancel:
    put:
      operationId: CancelBooking
      tags:
        - Booking
      summary: Cancel a confirmed booking
      description: |
        Allows a client or trainer to cancel a confirmed booking (PUT /bookings/:id/cancel).
        Enforces cancellation policy based on time until session:
        - Within 12 hours: No credit refund (credits forfeited)
        - After 12 hours: Full credit refund
        Releases the slot back to trainer's availability and notifies both parties.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Booking ID to cancel
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelBookingRequest"
      responses:
        "200":
          description: Booking cancelled successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CancelBookingResponse"
        "400":
          description: Invalid input or validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized (missing or invalid token)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden (user is not the client or trainer of this booking)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Booking not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Conflict (booking already cancelled or session already started)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

