openapi: 3.0.0
info:
  title: Personal-Trainer-API
  version: 1.0.0

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    BaseResponse:
      type: object
      required: [status, message, code]
      properties:
        status:
          type: string
          enum: [success, error]
        message:
          type: string
        code:
          type: string
          description: Machine-readable response code (e.g., OK, BAD_REQUEST, NOT_FOUND)

    FieldError:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
        message:
          type: string

    ErrorResponse:
      type: object
      required: [status, message, code]
      properties:
        status:
          type: string
          enum: [error]
        message:
          type: string
        code:
          type: string
        errors:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"

    SuccessResponse:
      type: object
      required: [status, message, code]
      properties:
        status:
          type: string
          enum: [success]
        message:
          type: string
        code:
          type: string
        data:
          type: object
          additionalProperties: true
          nullable: true
        meta:
          type: object
          additionalProperties: true
          nullable: true

    TrainerResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Trainer"

    TrainersListResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          properties:
            data:
              type: array
              maxItems: 1000
              items:
                $ref: "#/components/schemas/Trainer"

    AuthUser:
      type: object
      required: [id, email, name, user_type, profile_complete]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        user_type:
          type: string
          enum: [client, trainer, admin]
        profile_complete:
          type: boolean

    GoogleAuthResponse:
      type: object
      required: [status, message, data]
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: GOOGLE_AUTH_SUCCESSFUL
        data:
          type: object
          required: [user, access_token, refresh_token, is_new_user, expires_in]
          properties:
            user:
              $ref: "#/components/schemas/AuthUser"
            access_token:
              type: string
            refresh_token:
              type: string
            is_new_user:
              type: boolean
            expires_in:
              type: integer
              example: 600

    Trainer:
      type: object
      required:
        - id
        - user_id
        - calendly_connected
        - onboarding_status
        - average_rating
        - total_reviews
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        specialization:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        years_of_experience:
          type: integer
          nullable: true
        intro_video_url:
          type: string
          nullable: true
        display_picture:
          type: string
          nullable: true
        calendly_connected:
          type: boolean
        calendly_link:
          type: string
          nullable: true
        onboarding_status:
          type: string
          enum: [pending, approved, rejected, suspended]
        average_rating:
          type: number
        total_reviews:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    CreateTrainerRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          format: uuid
        specialization:
          type: string
        bio:
          type: string
        years_of_experience:
          type: integer
        intro_video_url:
          type: string
        display_picture:
          type: string
        calendly_connected:
          type: boolean
        calendly_link:
          type: string
        onboarding_status:
          type: string
          enum: [pending, approved, rejected, suspended]

    UpdateTrainerRequest:
      type: object
      properties:
        specialization:
          type: string
        bio:
          type: string
        years_of_experience:
          type: integer
        intro_video_url:
          type: string
        display_picture:
          type: string
        calendly_connected:
          type: boolean
        calendly_link:
          type: string
        onboarding_status:
          type: string
          enum: [pending, approved, rejected, suspended]

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      security: []
      operationId: HandleLocalAuth
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/google:
    get:
      security: []
      operationId: HandleGoogleLogin
      summary: Initiate Google OAuth — redirects browser to Google consent screen
      responses:
        "302":
          description: Redirect to Google login

  /auth/google/callback:
    get:
      security: []
      operationId: HandleGoogleCallback
      summary: Handle Google OAuth callback and return JWT tokens
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoogleAuthResponse"
        "400":
          description: Invalid or missing state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to exchange code or fetch user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /health:
    get:
      security: []
      operationId: HealthCheck
      responses:
        "200":
          description: Health OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /:
    get:
      security: []
      operationId: Root
      responses:
        "200":
          description: Root OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /trainers:
    get:
      operationId: GetTrainers
      summary: Get trainers (admin only)
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Filter by category (maps to trainers.specialization)
      responses:
        "200":
          description: Trainers fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: CreateTrainer
      summary: Add trainer (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTrainerRequest"
      responses:
        "201":
          description: Trainer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trainers/{id}:
    get:
      operationId: GetTrainerByID
      summary: Get trainer by ID (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Trainer fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Trainer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: UpdateTrainer
      summary: Update trainer (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTrainerRequest"
      responses:
        "200":
          description: Trainer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Trainer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: DeleteTrainer
      summary: Delete trainer (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Trainer deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "404":
          description: Trainer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
