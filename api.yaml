      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: You are already on the waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                status: success
                message: You're already on the waitlist
                code: OK
        "201":
          description: You have been added to the waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                status: success
                message: Successfully added to the waitlist
                code: OK
        "400":
          description: Invalid or missing email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Invalid or missing email
                code: BAD_REQUEST
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Internal server error
                code: SERVER_ERROR
    get:
      security:
        - bearerAuth: []
      operationId: HandleGetWaitlist
      tags:
        - Waitlist
      summary: Handle getting emails or filtered emails in waitlist
      parameters:
        - name: email
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Waitlists retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                status: success
                message: Success
