openapi: 3.0.0
info:
  title: Personal-Trainer-API
  version: 1.0.0

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    AuthUser:
      type: object
      required: [id, email, name, user_type, profile_complete]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        user_type:
          type: string
          enum: [client, trainer, admin]
        profile_complete:
          type: boolean

    GoogleAuthResponse:
      type: object
      required: [status, message, data]
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: GOOGLE_AUTH_SUCCESSFUL
        data:
          type: object
          required: [user, access_token, refresh_token, is_new_user, expires_in]
          properties:
            user:
              $ref: "#/components/schemas/AuthUser"
            access_token:
              type: string
            refresh_token:
              type: string
            is_new_user:
              type: boolean
            expires_in:
              type: integer
              example: 600

    Trainer:
      type: object
      required:
        - id
        - user_id
        - calendly_connected
        - onboarding_status
        - total_reviews
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
          description: Trainer ID (trainers.id)
        user_id:
          type: string
          format: uuid
          description: Linked user ID (trainers.user_id)

        specialization:
          type: string
          nullable: true
          description: Category/specialization used for filtering

        bio:
          type: string
          nullable: true

        years_of_experience:
          type: integer
          nullable: true

        intro_video_url:
          type: string
          nullable: true

        display_picture:
          type: string
          nullable: true
          description: URL to trainer display picture (uploaded separately)

        calendly_connected:
          type: boolean

        calendly_link:
          type: string
          nullable: true

        onboarding_status:
          type: string
          enum: [pending, approved, rejected, suspended]
          example: pending

        average_rating:
          type: number
          nullable: true

        total_reviews:
          type: integer
          example: 0

        created_at:
          type: string
          format: date-time

        updated_at:
          type: string
          format: date-time

    TrainersListResponse:
      type: object
      required: [status, message, data]
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: TRAINERS_FETCHED
        data:
          type: array
          items:
            $ref: "#/components/schemas/Trainer"

    CreateTrainerRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          format: uuid
        specialization:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        years_of_experience:
          type: integer
          nullable: true
        intro_video_url:
          type: string
          nullable: true
        display_picture:
          type: string
          nullable: true
        calendly_connected:
          type: boolean
          nullable: true
        calendly_link:
          type: string
          nullable: true
        onboarding_status:
          type: string
          enum: [pending, approved, rejected, suspended]
          nullable: true

    UpdateTrainerRequest:
      type: object
      properties:
        specialization:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        years_of_experience:
          type: integer
          nullable: true
        intro_video_url:
          type: string
          nullable: true
        display_picture:
          type: string
          nullable: true
        calendly_connected:
          type: boolean
          nullable: true
        calendly_link:
          type: string
          nullable: true
        onboarding_status:
          type: string
          enum: [pending, approved, rejected, suspended]
          nullable: true

    TrainerResponse:
      type: object
      required: [status, message, data]
      properties:
        status:
          type: string
          example: success
        message:
          type: string
          example: TRAINER_UPDATED
        data:
          $ref: "#/components/schemas/Trainer"

    ErrorResponse:
      type: object
      required: [status, message]
      properties:
        status:
          type: string
          example: error
        message:
          type: string
          example: Forbidden; Admin access required

security:
  - bearerAuth: []

paths:
  /auth/login:
    post:
      security: []
      operationId: HandleLocalAuth
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                type: object
                required:
                  - status
                  - message
                  - code
                  - data
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: Login successful
                  code:
                    type: string
                    example: AUTH_LOGIN_SUCCESS
                  data:
                    type: object
                    required:
                      - access_token
                      - refresh_token
                    properties:
                      access_token:
                        type: string
                      refresh_token:
                        type: string

  /auth/google:
    get:
      security: []
      operationId: HandleGoogleLogin
      summary: Initiate Google OAuth — redirects browser to Google consent screen
      responses:
        "302":
          description: Redirect to Google login

  /auth/google/callback:
    get:
      security: []
      operationId: HandleGoogleCallback
      summary: Handle Google OAuth callback and return JWT tokens
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoogleAuthResponse"
        "400":
          description: Invalid or missing state
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string
        "500":
          description: Failed to exchange code or fetch user info
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /trainers:
    get:
      operationId: GetTrainers
      summary: Get trainers (admin-only)
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Filters trainers by specialization (exact match)
      responses:
        "200":
          description: Trainers fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainersListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden (admin-only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: CreateTrainer
      summary: Add trainer (admin-only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTrainerRequest"
      responses:
        "201":
          description: Trainer created
          content:
            application/json:
              schema:
                type: object
                required: [status, message, data]
                properties:
                  status:
                    type: string
                    example: success
                  message:
                    type: string
                    example: TRAINER_CREATED
                  data:
                    $ref: "#/components/schemas/Trainer"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden (admin-only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trainers/{id}:
    put:
      operationId: UpdateTrainer
      summary: Update trainer (admin-only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
          description: Trainer ID (trainers.id)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTrainerRequest"
      responses:
        "200":
          description: Trainer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainerResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden (admin-only)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Trainer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
