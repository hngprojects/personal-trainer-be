openapi: 3.0.0
info:
  title: Personal-Trainer-API
  version: 1.0.0

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    BaseResponse:
      type: object
      required: [status, message, code]
      properties:
        status:
          type: string
          enum: [success, error]
        message:
          type: string
        code:
          type: string
          description: Machine-readable response code (e.g., OK, BAD_REQUEST, NOT_FOUND)

    FieldError:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
          description: The field that failed validation
        message:
          type: string
          description: Human-readable error message for this field

    ErrorResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            errors:
              type: array
              nullable: true
              items:
                $ref: "#/components/schemas/FieldError"

    SuccessResponse:
      allOf:
        - $ref: "#/components/schemas/BaseResponse"
        - type: object
          properties:
            data:
              nullable: true
              description: Any JSON value (object/array/string/number/etc)
              x-go-type: interface{}
            meta:
              nullable: true
              description: Any JSON value (usually object)
              x-go-type: interface{}

    PaginationMeta:
      type: object
      required: [page, per_page, total_pages, total_count]
      properties:
        page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 10
        total_pages:
          type: integer
          example: 3
        total_count:
          type: integer
          example: 25
        next:
          type: string
          nullable: true
          example: "/progress?page=2"
        prev:
          type: string
          nullable: true

    Trainer:
      type: object
      required:
        - id
        - user_id
        - calendly_connected
        - onboarding_status
        - average_rating
        - total_reviews
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        specialization:
          type: string
          nullable: true
        bio:
          type: string
          nullable: true
        years_of_experience:
          type: integer
          nullable: true
        intro_video_url:
          type: string
          nullable: true
        display_picture:
          type: string
          nullable: true
        calendly_connected:
          type: boolean
        calendly_link:
          type: string
          nullable: true
        onboarding_status:
          type: string
          enum: [pending, approved, rejected, suspended]
        average_rating:
          type: number
          nullable: true
          format: float
          description: Average rating from client reviews. Null if no reviews yet.
        total_reviews:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TrainerResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          properties:
            data:
              $ref: "#/components/schemas/Trainer"

    TrainersListResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          properties:
            data:
              type: array
              maxItems: 1000
              items:
                $ref: "#/components/schemas/Trainer"

    CreateTrainerRequest:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string
          format: uuid
        specialization:
          type: string
        bio:
          type: string
        years_of_experience:
          type: integer
        intro_video_url:
          type: string
        display_picture:
          type: string
        calendly_connected:
          type: boolean
        calendly_link:
          type: string
        onboarding_status:
          type: string
          enum: [pending, approved, rejected, suspended]

    UpdateTrainerRequest:
      type: object
      properties:
        specialization:
          type: string
        bio:
          type: string
        years_of_experience:
          type: integer
        intro_video_url:
          type: string
        display_picture:
          type: string
        calendly_connected:
          type: boolean
        calendly_link:
          type: string
        onboarding_status:
          type: string
          enum: [pending, approved, rejected, suspended]

    AuthUser:
      type: object
      required: [id, email, name, user_type, profile_complete]
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        name:
          type: string
        user_type:
          type: string
          enum: [client, trainer, admin]
        profile_complete:
          type: boolean

    GoogleAuthData:
      type: object
      required: [user, access_token, refresh_token, is_new_user, expires_in]
      properties:
        user:
          $ref: "#/components/schemas/AuthUser"
        access_token:
          type: string
        refresh_token:
          type: string
        is_new_user:
          type: boolean
        expires_in:
          type: integer
          example: 600

    GoogleAuthResponse:
      allOf:
        - $ref: "#/components/schemas/SuccessResponse"
        - type: object
          required: [data]
          properties:
            data:
              $ref: "#/components/schemas/GoogleAuthData"
security:
  - bearerAuth: []

paths:
  /:
    get:
      operationId: Root
      summary: Root endpoint
      security: []
      responses:
        "200":
          description: Server is running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /health:
    get:
      operationId: HealthCheck
      summary: Health check endpoint
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/login:
    post:
      security: []
      operationId: HandleLocalAuth
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/google:
    get:
      security: []
      operationId: HandleGoogleLogin
      summary: Initiate Google OAuth — redirects browser to Google consent screen
      responses:
        "302":
          description: Redirect to Google login

  /auth/google/callback:
    get:
      security: []
      operationId: HandleGoogleCallback
      summary: Handle Google OAuth callback and return JWT tokens
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Authentication successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoogleAuthResponse"
        "400":
          description: Invalid or missing state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: OAuth exchange failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Failed to exchange code or fetch user info
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trainers:
    get:
      operationId: GetTrainers
      summary: Get trainers (admin only)
      parameters:
        - name: category
          in: query
          required: false
          schema:
            type: string
          description: Filter by category (maps to trainers.specialization)
      responses:
        "200":
          description: Trainers fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainersListResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    post:
      operationId: CreateTrainer
      summary: Add trainer (admin only)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTrainerRequest"
      responses:
        "201":
          description: Trainer created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainerResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trainers/{id}:
    get:
      operationId: GetTrainerByID
      summary: Get trainer by ID (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Trainer fetched
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainerResponse"
        "404":
          description: Trainer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    patch:
      operationId: UpdateTrainer
      summary: Update trainer (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateTrainerRequest"
      responses:
        "200":
          description: Trainer updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainerResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Trainer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      operationId: DeleteTrainer
      summary: Delete trainer (admin only)
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: Trainer deleted
        "404":
          description: Trainer not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
  /waitlist:
    post:
      security: []
      operationId: HandleAddWaitlist
      summary: Handle adding an email address to the waitlist table
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email]
              properties:
                email:
                  type: string
                  format: email
      responses:
        "200":
          description: You are already on the waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                status: success
                message: You're already on the waitlist
                code: OK
        "201":
          description: You have been added to the waitlist
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                status: success
                message: Successfully added to the waitlist
                code: OK
        "400":
          description: Invalid or missing email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Invalid or missing email
                code: BAD_REQUEST
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Internal server error
                code: SERVER_ERROR
    get:
      security:
        - bearerAuth: []
      operationId: HandleGetWaitlist
      summary: Handle getting emails or filtered emails in waitlist
      parameters:
        - name: email
          in: query
          required: false
          schema:
            type: string
      responses:
        "200":
          description: Waitlists retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                status: success
                message: Success
                code: OK
        "404":
          description: Email not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Requested email is not on the waitlist
                code: NOT_FOUND
        "401":
          description: Client is unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Unauthorized access
                code: UNAUTHORIZED
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Internal server error
                code: SERVER_ERROR
