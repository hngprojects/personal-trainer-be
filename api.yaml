    post:
      operationId: CreateTrainer
      tags:
        - Trainer
      summary: Admin creates a trainer (admin or super_admin)
      description: |
        Admin-only. Provisions a new trainer end-to-end in a single multipart
        request:
          1. Creates the underlying user account (role='trainer') with a
             server-generated 16-char password.
          2. Inserts the trainer row with the admin-supplied specializations,
             training styles, years of experience, and onboarding_status.
          3. Inserts each benefit (title + subtext) preserving submitted order.
          4. Optionally enqueues the display_picture file for async upload —
             the trainer row is returned immediately with display_picture=null
             and the column is populated by the background worker once the
             object lands in storage.
          5. Emails the generated credentials to the trainer's email address.
             The plaintext password is never persisted; it leaves the server
             exactly once via that email.

        Re-inviting the same email rotates the password (no duplicate user is
        created). bio and intro_video_url are NOT set here — the
        trainer fills those in themselves once they log in.
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              $ref: "#/components/schemas/CreateTrainerRequest"
      responses:
        "201":
          description: Trainer provisioned; credentials emailed. display_picture may briefly 404 while the worker uploads.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TrainerResponse"
        "400":
          description: Bad request (invalid multipart, invalid email, specializations not in catalog, etc)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "401":
          description: Unauthorized (missing or invalid JWT)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "403":
          description: Forbidden (caller is authenticated but not admin or super_admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: A trainer profile already exists for the supplied email
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "413":
          description: display_picture exceeds the 5 MiB limit
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

