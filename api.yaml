  /auth/forgot-password:
    post:
      security: []
      operationId: HandleForgotPassword
      tags:
        - Auth — Local
        - Authentication
      summary: Request a password reset code
      description: >-
        Sends a 6-digit reset code to the email address if it belongs to a
        registered local user that holds the `admin` role. The endpoint
        always returns the same generic success response regardless of
        whether the email exists or whether the user is an admin — this
        is intentional, to prevent account / role enumeration. The role
        gate is enforced server-side; this is unauthenticated by design
        because the caller has no token to present when they have lost
        their password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ForgotPasswordRequest"
      responses:
        "200":
          description: Generic acknowledgement (delivered whether or not the email exists)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                status: success
                message: if the email is registered, a reset code has been sent
                code: OK
                data: null
        "400":
          description: Validation error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Validation error
                code: BAD_REQUEST
                errors:
                  - field: email
                    message: invalid email format
        "429":
          description: Too many requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: too many requests, please try again later
                code: TOO_MANY_REQUESTS
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Internal server error
                code: SERVER_ERROR
  /auth/reset-password:
    post:
      security: []
      operationId: HandleResetPassword
      tags:
        - Auth — Local
        - Authentication
      summary: Reset password using a previously emailed code
      description: >-
        Validates the 6-digit code and sets a new password. The endpoint is
        gated server-side to users that currently hold the `admin` role —
        any other caller (non-admin, inactive, unknown email, wrong code)
        receives the same generic 400 response so the role check cannot be
        probed. On success the code is consumed (single-use) and all
        existing refresh sessions for the user are revoked. Unauthenticated
        by design, since the caller has no token when resetting a forgotten
        password.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResetPasswordRequest"
      responses:
        "200":
          description: Password reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                status: success
                message: password reset successful
                code: OK
                data: null
        "400":
          description: Validation error or invalid/expired code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: invalid or expired reset code
                code: BAD_REQUEST
        "429":
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: too many attempts, please request a new code
                code: TOO_MANY_REQUESTS
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: Internal server error
                code: SERVER_ERROR

  /trainers/set-password:
    post:
      security: []
      operationId: HandleSetPassword
      tags:
        - Trainer
        - Authentication
      summary: Set the initial password for an admin-provisioned trainer account
      description: >-
        Consumes a one-time activation token emailed to a newly provisioned
        trainer and stores the chosen password. The token is single-use and
        expires after a configurable window (default 7 days). Every failure
        branch returns the same generic 400 so an attacker cannot tell
        "wrong token" from "already consumed" from "expired".
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [token, new_password]
              properties:
                token:
                  type: string
                  description: Activation token from the setup email link
                new_password:
                  type: string
                  format: password
                  minLength: 8
                  # maxLength matches bcrypt's 72-byte ceiling — same cap
                  # the reset-password endpoint enforces server-side. Kept
                  # in the spec so the FE rejects oversize inputs before
                  # round-tripping to the server.
                  maxLength: 72
      responses:
        "200":
          description: Password set successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"
              example:
                status: success
                message: password set successfully
                code: OK
                data: null
        "400":
          description: Validation error or invalid/expired setup token
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
              example:
                status: error
                message: invalid or expired setup token
                code: BAD_REQUEST
        "429":
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: >-
            Service unavailable — the account-setup handler is not wired on
            this server (configuration issue, e.g. DB unavailable at boot).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /trainers/set-password/validate:
    get:
      security: []
      operationId: HandleValidateSetupToken
      tags:
        - Trainer
        - Authentication
      summary: Check whether a trainer setup token is still valid (no consume)
      description: >-
        Pre-flight check used by the FE set-password page. Returns 200 with
        a `status` field describing the token's state so the FE can branch
        on it: `valid` (show password form), `expired` (link timed out),
        `consumed` (already used), `invalid` (unknown token). Does NOT
        mark the token used — that only happens on
        `POST /trainers/set-password`.
      parameters:
        - name: token
          in: query
          required: true
          schema:
            type: string
          description: Activation token from the setup email link
      responses:
        "200":
          description: Token state returned
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          status:
                            type: string
                            enum: [valid, expired, consumed, invalid]
                          valid:
                            type: boolean
                          expires_at:
                            type: string
                            format: date-time
              example:
                status: success
                message: setup token checked
                code: OK
                data:
                  status: valid
                  valid: true
                  expires_at: "2026-05-29T12:00:00Z"
        "400":
          description: Missing or empty `token` query parameter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "429":
          description: Too many attempts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "503":
          description: >-
            Service unavailable — the account-setup handler is not wired on
            this server (configuration issue, e.g. DB unavailable at boot).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

