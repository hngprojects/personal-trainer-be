  /trainers/{id}/images:
    post:
      operationId: UploadTrainerImages
      tags:
        - Trainer
      summary: Upload gallery images for a trainer (admin only)
      description: |
        Upload one or more images to a trainer's gallery. Each request can carry
        up to 5 images in a single multipart `images` field; the server caps
        the total stored per trainer at 5 (existing + incoming). If the cap
        would be exceeded, the request is rejected entirely — no partial
        success.

        Accepted formats: JPEG, PNG, WebP, HEIC. Each image up to 5 MiB
        (matches the avatar size policy). Uploads are async (workers), the
        202 response includes the URLs the images will appear at once the
        workers complete.
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [images]
              properties:
                images:
                  type: array
                  items:
                    type: string
                    format: binary
                  minItems: 1
                  maxItems: 5
      responses:
        "202":
          description: Upload(s) accepted and queued
          content:
            application/json:
              schema:
                allOf:
                  - $ref: "#/components/schemas/SuccessResponse"
                  - type: object
                    properties:
                      data:
                        type: object
                        required: [image_urls, status]
                        properties:
