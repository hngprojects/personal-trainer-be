<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Client Rescheduled Training Session</title>
  </head>
  <body
    style="
      font-family: Arial, sans-serif;
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    "
  >
    <h2 style="color: #1a1a2e">Client Rescheduled Training Session</h2>
    <p>
      Your client <strong>{{.ClientName}}</strong> has rescheduled their
      training session.
    </p>
    <table style="width: 100%; border-collapse: collapse; margin: 20px 0">
      <tr>
        <td
          style="padding: 10px; background: #f8d7da; border-radius: 4px 0 0 4px"
        >
          <strong>Previous Time</strong><br />{{.OldTime}}
        </td>
        <td
          style="padding: 10px; background: #d4edda; border-radius: 0 4px 4px 0"
        >
          <strong>New Time</strong><br />{{.NewTime}}
        </td>
      </tr>
    </table>
    <p><strong>Timezone:</strong> {{.Timezone}}</p>
    {{ if .ZoomLink }}
    <p>
      <strong>New Zoom Link:</strong> <a href="{{.ZoomLink}}">{{.ZoomLink}}</a>
    </p>
    {{ end }}
    <p style="color: #666; font-size: 12px">FitCall Team</p>
  </body>
</html>
