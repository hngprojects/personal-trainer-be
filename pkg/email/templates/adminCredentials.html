<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background: #f4f4f5;
      font-family: Arial, sans-serif;
    "
  >
    <table width="100%" cellpadding="0" cellspacing="0" style="padding: 40px 0">
      <tr>
        <td align="center">
          <table
            width="480"
            cellpadding="0"
            cellspacing="0"
            style="background: #ffffff; border-radius: 8px; padding: 40px"
          >
            <tr>
              <td align="center" style="padding-bottom: 16px">
                <h2 style="margin: 0; font-size: 22px; color: #111827">
                  Your admin account is ready
                </h2>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-bottom: 24px">
                <p style="margin: 0; font-size: 14px; color: #6b7280">
                  An admin account was created for you. Use the credentials
                  below to sign in.
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding: 8px 0">
                <p style="margin: 0; font-size: 14px; color: #111827">
                  <strong>Email:</strong> {{ .Email }}
                </p>
              </td>
            </tr>
            <tr>
              <td style="padding: 8px 0 24px">
                <p style="margin: 0; font-size: 14px; color: #111827">
                  <strong>Temporary password:</strong>
                  <span
                    style="
                      font-family: monospace;
                      background: #f4f4f5;
                      padding: 4px 8px;
                      border-radius: 4px;
                    "
                    >{{ .Password }}</span
                  >
                </p>
              </td>
            </tr>
            <tr>
              <td align="center" style="padding-top: 16px">
                <p style="margin: 0; font-size: 12px; color: #9ca3af">
                  Please change this password after your first sign-in. Do not
                  share this email with anyone.
                </p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
